<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>J. W. González — Publications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f8f8f6;
      --border: #e8e6e0;
      --border-strong: #d0cdc5;
      --text: #1a1916;
      --muted: #6b6760;
      --accent: #1a56db;
      --accent-light: #ebf0fd;
      --tag-journal: #e8f4ee;
      --tag-journal-text: #1a6640;
      --tag-book: #f0ebfd;
      --tag-book-text: #5b3db5;
      --tag-preprint: #fdf4e8;
      --tag-preprint-text: #8a5a0a;
      --gold: #c07c10;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 3.5rem 0 2.5rem;
      text-align: center;
    }

    header h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    header .role {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .orcid-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.02em;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .orcid-link:hover { border-color: var(--accent); }

    /* ── Layout ── */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 6rem;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 0;
      margin-bottom: 2.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }
    .stat {
      flex: 1;
      padding: 1rem 1.2rem;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .stat:last-child { border-right: none; }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .filter-group { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .filter-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Publication card ── */
    .pub-card {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pub-num {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      min-width: 1.8rem;
      padding-top: 0.15rem;
      text-align: right;
      flex-shrink: 0;
    }

    .pub-body { flex: 1; min-width: 0; }

    .pub-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.3rem;
    }

    .pub-year {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gold);
    }

    .pub-tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.1rem 0.5rem;
      border-radius: 100px;
    }
    .tag-journal  { background: var(--tag-journal);  color: var(--tag-journal-text); }
    .tag-book     { background: var(--tag-book);     color: var(--tag-book-text); }
    .tag-preprint { background: var(--tag-preprint); color: var(--tag-preprint-text); }

    .pub-journal {
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted);
    }

    .pub-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 0.975rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .pub-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.12s, color 0.12s;
    }
    .pub-title a:hover { color: var(--accent); border-color: var(--accent); }

    .pub-authors {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .pub-authors .me {
      color: var(--text);
      font-weight: 500;
    }

    .pub-doi {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.4rem;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.12s;
    }
    .pub-doi:hover { color: var(--accent); }

    /* ── Loading / empty ── */
    .loading {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Footer ── */
    footer {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); }
    footer a:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Sync badge ── */
    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Jhon W. González</h1>
  <p class="role">Condensed Matter Physics · Universidad de Antofagasta</p>
  <a class="orcid-link"
     href="https://orcid.org/0000-0003-2238-5522"
     target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 256 256" fill="none">
      <circle cx="128" cy="128" r="128" fill="#A6CE39"/>
      <path d="M86 186H71V79h15v107zM109 79h42c40 0 57 28 57 54 0 28-22 54-57 54h-42V79zm15 93h25c35 0 43-26 43-40 0-21-14-40-44-40h-24v80zM89 57c0 5-5 10-11 10s-10-5-10-10 5-10 10-10 11 5 11 10z" fill="white"/>
    </svg>
    0000-0003-2238-5522
  </a>
</header>

<main>
  <!-- Stats -->
  <div class="stats" id="stats-bar">
    <div class="stat">
      <span class="stat-value" id="total-count">—</span>
      <span class="stat-label">Works</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="journal-count">—</span>
      <span class="stat-label">Articles</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="year-range">—</span>
      <span class="stat-label">Years</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="last-updated">—</span>
      <span class="stat-label">Synced</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search title, author, journal…" autocomplete="off"/>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="journal-article">Articles</button>
      <button class="filter-btn" data-filter="book-chapter">Books</button>
      <button class="filter-btn" data-filter="preprint">Preprints</button>
    </div>
  </div>

  <!-- List -->
  <div id="pub-list">
    <div class="loading">
      <div class="spinner"></div>
      Fetching from ORCID…
    </div>
  </div>
</main>

<footer>
  <span>
    Synced automatically from
    <a href="https://orcid.org/0000-0003-2238-5522" target="_blank">ORCID</a>
    · Updates every Monday
  </span>
  <a href="https://sites.google.com/view/jwgonzal/about" target="_blank">← Back to main site</a>
</footer>

<script>
const ORCID = '0000-0003-2238-5522';
const ME    = ['González, J', 'Gonzalez, J', 'González J', 'Gonz'];

let all = [], activeFilter = 'all', query = '';

async function load() {
  const r = await fetch(`https://pub.orcid.org/v3.0/${ORCID}/works`, {
    headers: { Accept: 'application/json' }
  });
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  return (d.group || []);
}

function parse(g) {
  const s    = g['work-summary']?.[0];
  if (!s) return null;
  const title = s.title?.title?.value || 'Untitled';
  const year  = s['publication-date']?.year?.value || null;
  const type  = s.type || 'journal-article';
  const journal = s['journal-title']?.value || '';
  const ids   = s['external-ids']?.['external-id'] || [];
  let doi = null;
  for (const id of ids) if (id['external-id-type'] === 'doi') { doi = id['external-id-value']; break; }
  const url = s.url?.value || (doi ? `https://doi.org/${doi}` : null);
  const authors = (s.contributors?.contributor || [])
    .map(c => c['credit-name']?.value || '').filter(Boolean);
  return { title, year, type, journal, doi, url, authors };
}

function isMe(a) {
  return ME.some(n => a.includes(n)) || /Gonz[aá]lez,?\s*J\.?\s*W/i.test(a);
}

function authorHtml(arr) {
  if (!arr.length) return '';
  return arr.map(a => isMe(a) ? `<span class="me">${a}</span>` : a).join(', ');
}

function typeTag(t) {
  const map = { 'journal-article': ['journal','Article'], 'book-chapter': ['book','Chapter'], 'preprint': ['preprint','Preprint'] };
  return map[t] || ['journal', t.replace(/-/g,' ')];
}

function filtered() {
  let r = all;
  if (activeFilter !== 'all') r = r.filter(w => w.type === activeFilter);
  if (query.trim()) {
    const q = query.toLowerCase();
    r = r.filter(w =>
      w.title.toLowerCase().includes(q) ||
      w.journal.toLowerCase().includes(q) ||
      w.authors.some(a => a.toLowerCase().includes(q))
    );
  }
  return r;
}

function render() {
  const list = document.getElementById('pub-list');
  const data = filtered();
  if (!data.length) { list.innerHTML = '<div class="empty">No publications found.</div>'; return; }

  const sections = {};
  const order = ['book-chapter','preprint','journal-article','other'];
  const labels = { 'book-chapter':'Book chapters', 'preprint':'Preprints', 'journal-article':'Journal articles', 'other':'Other' };

  for (const w of data) {
    const k = order.includes(w.type) ? w.type : 'other';
    if (!sections[k]) sections[k] = [];
    sections[k].push(w);
  }

  let html = '';
  let idx = 0;
  for (const k of order) {
    if (!sections[k]) continue;
    html += `<div class="section-title">${labels[k]}</div>`;
    sections[k].forEach(w => {
      const num = data.length - idx;
      const [tagClass, tagLabel] = typeTag(w.type);
      const doi = w.doi ? w.doi.replace(/^https?:\/\/doi\.org\//i,'') : null;
      const href = w.url || (doi ? `https://doi.org/${doi}` : null);
      html += `
      <div class="pub-card" style="animation-delay:${idx*0.03}s">
        <span class="pub-num">${String(num).padStart(2,'0')}</span>
        <div class="pub-body">
          <div class="pub-meta">
            ${w.year ? `<span class="pub-year">${w.year}</span>` : ''}
            <span class="pub-tag tag-${tagClass}">${tagLabel}</span>
            ${w.journal ? `<span class="pub-journal">${w.journal}</span>` : ''}
          </div>
          <div class="pub-title">${href ? `<a href="${href}" target="_blank" rel="noopener">${w.title}</a>` : w.title}</div>
          ${w.authors.length ? `<div class="pub-authors">${authorHtml(w.authors)}</div>` : ''}
          ${doi ? `<a class="pub-doi" href="https://doi.org/${doi}" target="_blank" rel="noopener">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            doi:${doi}</a>` : ''}
        </div>
      </div>`;
      idx++;
    });
  }
  list.innerHTML = html;
}

function updateStats(works) {
  const j = works.filter(w => w.type === 'journal-article').length;
  const ys = works.map(w => parseInt(w.year)).filter(Boolean);
  document.getElementById('total-count').textContent   = works.length;
  document.getElementById('journal-count').textContent = j;
  document.getElementById('year-range').textContent    = ys.length ? `${Math.min(...ys)}–${Math.max(...ys)}` : '—';
  document.getElementById('last-updated').textContent  = new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'short'});
}

async function init() {
  try {
    const groups = await load();
    all = groups.map(parse).filter(Boolean).sort((a,b) => (b.year||0)-(a.year||0));
    updateStats(all);
    render();
  } catch(e) {
    document.getElementById('pub-list').innerHTML =
      `<div class="empty">Could not load from ORCID.<br><small>${e.message}</small></div>`;
  }
}

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = b.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

init();
</script>
</body>
</html>
