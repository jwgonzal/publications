name: Deploy Publications Page

on:
  # Run every Monday at 08:00 UTC (05:00 hora Chile)
  schedule:
    - cron: '0 8 * * 1'

  # Also run on every push to main
  push:
    branches:
      - main

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify ORCID is reachable
        run: |
          echo "Checking ORCID API for 0000-0003-2238-5522 ..."
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Accept: application/json" \
            "https://pub.orcid.org/v3.0/0000-0003-2238-5522/works"
          echo " — ORCID API OK"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
